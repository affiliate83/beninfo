name: 자동 크롤링 + AI 풍부화

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 KST 10:00
  workflow_dispatch:       # 수동 실행 버튼

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: .env 생성
        run: |
          cat > .env << 'EOF'
          WP_URL=${{ secrets.WP_URL }}
          WP_USERNAME=${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD=${{ secrets.WP_APP_PASSWORD }}
          DATA_GO_KR_API_KEY=${{ secrets.DATA_GO_KR_API_KEY }}
          SENURI_API_ENDPOINT=https://apis.data.go.kr/B552474/SenuriService
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      - name: Senuri 채용공고 수집
        run: python -m crawler.main --source senuri --pages 3

      - name: 기존 포스트 AI 풍부화 (50건)
        run: python crawler/enrich_existing_posts.py

      - name: dedup.db 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dedup.db
          git diff --staged --quiet || git commit -m "chore: dedup.db 업데이트 $(date +'%Y-%m-%d')"
          git push